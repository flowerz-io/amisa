# Railway Nixpacks : réinstalle Chromium après deps npm (idempotent) puis compile.
# Ne définis pas PLAYWRIGHT_BROWSERS_PATH dans les variables Railway sauf besoin avancé :
# un chemin différent entre build et runtime casse chromium.executablePath().

[phases.install]
cmds = [
  "npm ci",
  "npx playwright install --with-deps chromium",
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node dist/index.js"
